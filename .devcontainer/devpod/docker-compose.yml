services:
  dev:
    image: ghcr.io/ijack-technologies/devpod-base:latest
    command: sleep infinity
    volumes:
      - ../../:/workspaces/postgresql_scheduler:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
